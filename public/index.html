<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Nomo News</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root { --navy:#1a1a2e; --gold:#FFD700; --ink:#0e0e16; --nav-h:62px; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; height:100%; background:var(--ink); color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; overflow:hidden; }
  #status { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:24px; color:#cfcfe0; font-size:15px; }
  .deck { display:flex; height:100vh; height:100dvh; overflow-x:auto; overflow-y:hidden;
    scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .deck::-webkit-scrollbar { display:none; }
  .card { position:relative; min-width:100vw; width:100vw; height:100vh; height:100dvh;
    scroll-snap-align:center; scroll-snap-stop:always; display:flex; flex-direction:column; }
  .photo { height:48vh; height:48dvh; background-size:cover; background-position:center;
    background-color:var(--navy); position:relative; flex-shrink:0; }
  .photo::after { content:""; position:absolute; left:0; right:0; bottom:0; height:90px;
    background:linear-gradient(to top, rgba(14,14,22,1), rgba(14,14,22,0)); }
  .badge { position:absolute; top:16px; left:16px; background:#E12828; color:#fff;
    font-size:11px; font-weight:600; letter-spacing:1px; padding:5px 11px; border-radius:6px; z-index:2; }
  .body { flex:1; padding:16px 22px calc(var(--nav-h) + 16px); display:flex; flex-direction:column; overflow:hidden; }
  .src { color:var(--gold); font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; }
  .headline { font-size:22px; font-weight:600; line-height:1.22; margin:8px 0 0; }
  .summary { font-size:15px; line-height:1.6; color:#d7d7e0; margin:12px 0 0; overflow-y:auto; }
  .read { margin-top:auto; padding-top:14px; }
  .read a { color:var(--gold); font-size:15px; font-weight:600; text-decoration:none;
    border-bottom:2px solid var(--gold); padding-bottom:3px; }
  .nav { position:fixed; left:0; right:0; bottom:0; height:var(--nav-h); display:flex; align-items:stretch;
    background:var(--navy); border-top:2px solid var(--gold); z-index:5; }
  .nav button { flex:1; border:none; background:transparent; color:var(--gold); font-size:17px;
    font-weight:600; display:flex; align-items:center; justify-content:center; gap:6px; cursor:pointer; }
  .nav button:active { background:rgba(255,215,0,0.12); }
  .nav button:disabled { color:#5a5a6b; }
  .nav .pos { width:84px; flex:none; display:flex; align-items:center; justify-content:center;
    color:#cfcfe0; font-size:13px; font-weight:600; border-left:1px solid #2c2c40; border-right:1px solid #2c2c40; }
</style>
</head>
<body>
  <div id="status">Loading the latest stories…</div>
  <div class="deck" id="deck" hidden></div>
  <div class="nav" id="nav" hidden>
    <button id="prev" aria-label="Previous story">‹ Prev</button>
    <span class="pos" id="pos">1 / 1</span>
    <button id="next" aria-label="Next story">Next ›</button>
  </div>

<script>
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand();
    tg.setHeaderColor && tg.setHeaderColor('#1a1a2e');
    tg.setBackgroundColor && tg.setBackgroundColor('#0e0e16'); }

  var deck = document.getElementById('deck');
  var posEl = document.getElementById('pos');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');
  var total = 0, index = 0;

  function esc(s) { return String(s || '').replace(/[&<>"]/g, function (c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c]; }); }
  function openLink(url) { if (tg && tg.openLink) tg.openLink(url); else window.open(url, '_blank'); }
  function haptic() { if (tg && tg.HapticFeedback) tg.HapticFeedback.selectionChanged(); }

  function syncControls() {
    posEl.textContent = (index + 1) + ' / ' + total;
    prevBtn.disabled = index === 0;
    nextBtn.disabled = index === total - 1;
  }
  function go(delta) {
    var target = Math.min(Math.max(index + delta, 0), total - 1);
    if (target === index) return;
    index = target;
    deck.scrollTo({ left: index * window.innerWidth, behavior: 'smooth' });
    syncControls();
    haptic();
  }

  function render(stories) {
    total = stories.length;
    deck.innerHTML = stories.map(function (s, i) {
      var photo = s.image ? 'style="background-image:url(\'' + esc(s.image) + '\')"' : '';
      var badge = i === 0 ? 'TOP STORY' : 'BRIEFING';
      var read = s.url
        ? '<div class="read"><a href="#" onclick="openLink(\'' + esc(s.url) + '\');return false;">Read the full story ›</a></div>'
        : '';
      return '<section class="card">'
        + '<div class="photo" ' + photo + '><span class="badge">' + badge + '</span></div>'
        + '<div class="body">'
        + '<div class="src">' + esc(s.source) + '</div>'
        + '<h1 class="headline">' + esc(s.title) + '</h1>'
        + '<p class="summary">' + esc(s.summary) + '</p>'
        + read
        + '</div></section>';
    }).join('');

    document.getElementById('status').hidden = true;
    deck.hidden = false;
    document.getElementById('nav').hidden = false;
    syncControls();

    prevBtn.addEventListener('click', function () { go(-1); });
    nextBtn.addEventListener('click', function () { go(1); });

    // Keep buttons/counter in sync if the user also swipes.
    var t;
    deck.addEventListener('scroll', function () {
      clearTimeout(t);
      t = setTimeout(function () {
        var i = Math.round(deck.scrollLeft / window.innerWidth);
        if (i !== index) { index = i; syncControls(); haptic(); }
      }, 80);
    }, { passive: true });
  }

  fetch('/api/stories')
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d.stories && d.stories.length) render(d.stories);
      else document.getElementById('status').textContent = 'No news available right now. Try again later.';
    })
    .catch(function () {
      document.getElementById('status').textContent = 'Could not load stories. Please try again.';
    });
</script>
</body>
</html>
